name: Ruff Check
on: [push, pull_request]
jobs:
  ruff:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Use GITHUB_TOKEN for fork compatibility. 
          # Note: Auto-commits using this token will NOT trigger subsequent CI runs (like tests).
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: "**/*.py"

      - name: Setup Python
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        if: steps.changed-files.outputs.any_changed == 'true'
        run: pip install ruff

      - name: Run Ruff Check --fix on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "${{ steps.changed-files.outputs.all_changed_files }}" | xargs -r ruff check --fix --config ci_ruff_check.toml || true

      - name: Commit formatting changes
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto ruff fix"

      - name: Run Ruff Check strictly on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "${{ steps.changed-files.outputs.all_changed_files }}" | xargs -r ruff check --config ci_ruff_check.toml
